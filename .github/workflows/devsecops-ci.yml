# =============================================================================
# DevSecOps CI Pipeline — Online Boutique (11 Microservices)
# Trigger: Push/PR vào main
# Luồng: Lint Dockerfile → Build Image → Trivy Scan → Push Docker Hub
# =============================================================================
name: DevSecOps CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Ma trận build: 11 services song song
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "🔨 ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Không dừng tất cả khi 1 service fail
      matrix:
        include:
          # ── Nhóm 2: Backend Độc lập ──
          - service: adservice
            context: src/adservice
            image: kihpn1711/adservice
          - service: currencyservice
            context: src/currencyservice
            image: kihpn1711/currencyservice
          - service: emailservice
            context: src/emailservice
            image: kihpn1711/emailservice
          - service: paymentservice
            context: src/paymentservice
            image: kihpn1711/paymentservice
          - service: shippingservice
            context: src/shippingservice
            image: kihpn1711/shippingservice
          - service: productcatalogservice
            context: src/productcatalogservice
            image: kihpn1711/productcatalogservice

          # ── Nhóm 3: Backend Phụ thuộc ──
          - service: cartservice
            context: src/cartservice/src   # Dockerfile nằm sâu 1 cấp
            image: kihpn1711/cartservice
          - service: checkoutservice
            context: src/checkoutservice
            image: kihpn1711/checkoutservice-custom
          - service: recommendationservice
            context: src/recommendationservice
            image: kihpn1711/recommendationservice

          # ── Nhóm 4: UI & AI ──
          - service: frontend
            context: src/frontend
            image: kihpn1711/frontend-custom
          - service: shoppingassistantservice
            context: src/shoppingassistantservice
            image: kihpn1711/shoppingassistantservice

    steps:
      # ── Bước 1: Checkout code ──
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # ── Bước 2: Lint Dockerfile bằng Hadolint ──
      - name: 🔍 Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.context }}/Dockerfile
          failure-threshold: warning  # Chỉ cảnh báo, không block pipeline

      # ── Bước 3: Setup Docker Buildx ──
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Bước 4: Build image tạm (local) để Trivy scan ──
      - name: 🏗️ Build image (local)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ matrix.image }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Bước 5: Trivy scan lỗ hổng bảo mật ──
      - name: 🛡️ Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'  # Không fail pipeline (cho demo), đổi '1' nếu muốn strict

      # ── Bước 6: Login Docker Hub ──
      - name: 🔑 Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

     # ── Bước 6.5: Lấy Short SHA và Timestamp để làm Tag xịn ──
      - name: 🏷️ Generate Tag
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      # ── Bước 7: Build & Push image chính thức ──
      - name: 🚀 Build & Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:v1.0.0-${{ env.DATE }}-${{ env.SHORT_SHA }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary job: chạy sau khi tất cả matrix hoàn tất
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: "📊 Pipeline Summary"
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📋 Pipeline Result
        run: |
          echo "================================================="
          echo "  DevSecOps CI Pipeline — Online Boutique"
          echo "================================================="
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Status  : ${{ needs.build.result }}"
          echo "================================================="
          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Một hoặc nhiều service build thất bại!"
            exit 1
          fi
          echo "✅ Tất cả services đã qua Lint + Scan + Push!"
